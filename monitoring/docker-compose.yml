services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./targets:/etc/prometheus/targets
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus

  dooray-proxy:
    image: python:3.12-slim
    container_name: dooray-proxy
    restart: unless-stopped
    volumes:
      - ./dooray-proxy/webhook_proxy.py:/app/webhook_proxy.py:ro
    environment:
      - DOORAY_WEBHOOK_URL=${DOORAY_WEBHOOK_URL}
      - LISTEN_PORT=5001
      - PYTHONUNBUFFERED=1
    command: python /app/webhook_proxy.py

  obs-checker:
    image: python:3.12-slim
    container_name: obs-checker
    profiles:
      - checker
    volumes:
      - ./obs_replication_check.py:/app/check.py:ro
    environment:
      - OBS_PRIMARY_ENDPOINT=${OBS_PRIMARY_ENDPOINT}
      - OBS_PRIMARY_REGION=${OBS_PRIMARY_REGION:-KR1}
      - OBS_PRIMARY_BUCKET=${OBS_PRIMARY_BUCKET}
      - OBS_DR_ENDPOINT=${OBS_DR_ENDPOINT}
      - OBS_DR_REGION=${OBS_DR_REGION:-KR2}
      - OBS_DR_BUCKET=${OBS_DR_BUCKET}
      - OBS_ACCESS_KEY=${OBS_ACCESS_KEY}
      - OBS_SECRET_KEY=${OBS_SECRET_KEY}
      - OBS_DIFF_THRESHOLD=${OBS_DIFF_THRESHOLD:-5}
      - DOORAY_WEBHOOK_URL=${DOORAY_WEBHOOK_URL}
    command: >
      bash -c "pip install -q boto3 && python /app/check.py"

volumes:
  prometheus_data:
  grafana_data:
